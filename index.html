<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>简单计时器</title>
	<style>
		body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f3f4f6; color:#111827; }
		.container { background: #fff; padding:24px; border-radius:12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); width:360px; text-align:center; }
		.display { font-size:48px; font-weight:700; letter-spacing:2px; margin-bottom:12px; }
		.controls { display:flex; gap:8px; justify-content:center; margin-bottom:12px; }
		button { padding:8px 12px; border-radius:8px; border:none; background:#2563eb; color:#fff; font-weight:600; cursor:pointer; }
		button.secondary { background:#6b7280; }
		button.danger { background:#ef4444; }
		.settings { display:flex; gap:8px; justify-content:center; margin-bottom:12px; align-items:center; }
		input[type="number"] { width:64px; padding:8px; border-radius:6px; border:1px solid #d1d5db; text-align:center; }
		label { font-size:14px; }
		.finished { color:#ef4444; animation:flash 1s infinite; }
		@keyframes flash { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }
	</style>
</head>
<body>
	<div class="container">
		<h1>简单计时器</h1>
		<div class="display" id="display">00:00:00</div>
		<div class="settings">
			<label><input type="radio" name="mode" value="stopwatch" checked> 计时</label>
			<label><input type="radio" name="mode" value="countdown"> 倒计时</label>
		</div>
		<div class="settings" id="countdownInputs" style="display:none;">
			<input type="number" id="minutes" min="0" placeholder="分" value="0"> :
			<input type="number" id="seconds" min="0" max="59" placeholder="秒" value="30">
		</div>
		<div class="controls">
			<button id="startBtn">开始</button>
			<button id="pauseBtn" class="secondary">暂停</button>
			<button id="resetBtn" class="danger">重置</button>
		</div>
		<div style="font-size:13px;color:#6b7280;">支持计时/倒计时；切换模式请先重置。</div>
	</div>

	<script>
	(function(){
		const display = document.getElementById('display');
		const startBtn = document.getElementById('startBtn');
		const pauseBtn = document.getElementById('pauseBtn');
		const resetBtn = document.getElementById('resetBtn');
		const modeRadios = document.querySelectorAll('input[name="mode"]');
		const countdownArea = document.getElementById('countdownInputs');
		const minutesInput = document.getElementById('minutes');
		const secondsInput = document.getElementById('seconds');

		let mode = 'stopwatch';
		let timerId = null;
		let startTime = 0;
		let elapsed = 0; // ms
		let remaining = 0; // ms, for countdown
		let initialDuration = 0;

		function formatTime(ms){
			if(ms < 0) ms = 0;
			const totalSec = Math.floor(ms/1000);
			const h = Math.floor(totalSec / 3600);
			const m = Math.floor((totalSec % 3600) / 60);
			const s = totalSec % 60;
			return [h,m,s].map(n => String(n).padStart(2,'0')).join(':');
		}

		function updateDisplay(){
			if(mode === 'stopwatch'){
				const now = Date.now();
				elapsed = now - startTime;
				display.textContent = formatTime(elapsed);
			} else {
				const now = Date.now();
				remaining = Math.max(0, remaining - (now - startTime));
				startTime = now;
				display.textContent = formatTime(remaining);
				if(remaining <= 0){
					stopTimer();
					onFinish();
				}
			}
		}

		function startTimer(){
			if(timerId) return;
			if(mode === 'stopwatch'){
				startTime = Date.now() - elapsed;
			} else {
				if(remaining <= 0){
					const mins = Math.max(0, Number(minutesInput.value) || 0);
					const secs = Math.max(0, Number(secondsInput.value) || 0);
					initialDuration = (mins*60 + secs) * 1000;
					remaining = initialDuration;
				}
				startTime = Date.now();
			}
			timerId = setInterval(updateDisplay, 200);
			startBtn.disabled = true;
			pauseBtn.disabled = false;
			resetBtn.disabled = false;
			display.classList.remove('finished');
		}

		function stopTimer(){
			if(timerId) {
				clearInterval(timerId);
				timerId = null;
			}
			startBtn.disabled = false;
			pauseBtn.disabled = true;
		}

		function pauseTimer(){
			if(!timerId) return;
			if(mode === 'stopwatch'){
				const now = Date.now();
				elapsed = now - startTime;
			}
			stopTimer();
		}

		function resetTimer(){
			stopTimer();
			elapsed = 0;
			remaining = 0;
			initialDuration = 0;
			display.textContent = '00:00:00';
			startBtn.disabled = false;
			pauseBtn.disabled = true;
			resetBtn.disabled = false;
			display.classList.remove('finished');
		}

		function onFinish(){
			display.classList.add('finished');
			beep();
		}

		function beep(){
			try {
				const ctx = new (window.AudioContext || window.webkitAudioContext)();
				const o = ctx.createOscillator();
				const g = ctx.createGain();
				o.type = 'sine';
				o.frequency.value = 880;
				o.connect(g);
				g.connect(ctx.destination);
				g.gain.value = 0.05;
				o.start();
				setTimeout(() => { o.stop(); ctx.close(); }, 400);
			} catch(e){ }
		}

		modeRadios.forEach(radio => {
			radio.addEventListener('change', e => {
				mode = e.target.value;
				resetTimer();
				if(mode === 'countdown'){
					countdownArea.style.display = 'flex';
				} else {
					countdownArea.style.display = 'none';
				}
			});
		});

		startBtn.addEventListener('click', startTimer);
		pauseBtn.addEventListener('click', pauseTimer);
		resetBtn.addEventListener('click', resetTimer);

		pauseBtn.disabled = true;
		resetBtn.disabled = false;
	})();
	</script>
</body>
</html>
